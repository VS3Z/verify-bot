services:
  - type: web
    name: south-group-verify
    runtime: node
    buildCommand: npm install && npm run deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: GUILD_ID
        sync: false
      - key: VERIFIED_ROLE_ID
        sync: false
      - key: REDIRECT_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
