<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تم التحقق • South Group</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <div class="page">
    <div class="card">

      <div class="server-icon-wrap">
        <img
          class="server-icon"
          src="https://images-ext-1.discordapp.net/external/FjvFsowvpkjSDro8ro1WXmr8V7cKuGW8Kky0qXa7rGU/%3Fsize%3D1024/https/cdn.discordapp.com/icons/1496940383874060548/382be9a3cff705917399d47b8c542722.png?format=webp&quality=lossless&width=901&height=901"
          alt="South Group"
        />
      </div>

      <div class="badge">
        <span class="badge-dot"></span>
        تم التحقق
      </div>

      <div class="status-icon status-success">✅</div>

      <h1>تم التحقق بنجاح!</h1>
      <p class="subtitle">مرحباً بك في مجتمع South Group 🎉<br/>تم منحك الصلاحيات الكاملة تلقائياً.</p>

      <div class="user-info" id="userInfo" style="display:none">
        <img id="userAvatar" src="" alt="avatar"/>
        <div>
          <div class="name" id="userName">—</div>
          <div class="tag">✓ &nbsp;تم التحقق بنجاح</div>
        </div>
      </div>

      <a href="https://discord.gg" class="btn btn-success" id="discordLink">
        🏠 &nbsp;العودة إلى السيرفر
      </a>

      <div class="footer">
        <span>South Group</span>
        <span class="footer-dot"></span>
        <span>نظام التحقق الآمن</span>
      </div>

    </div>
  </div>

  <script>
    fetch('/api/me')
      .then(r => r.json())
      .then(user => {
        if (!user) return;
        document.getElementById('userAvatar').src = user.avatar;
        document.getElementById('userName').textContent = user.username;
        document.getElementById('userInfo').style.display = 'flex';
      })
      .catch(() => {});
  </script>
</body>
</html>
