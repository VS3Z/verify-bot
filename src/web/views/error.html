<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>خطأ في التحقق • South Group</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <div class="page">
    <div class="card">

      <!-- Status icon -->
      <div class="status-icon status-error" id="statusIcon">❌</div>

      <h1 id="errorTitle">فشل التحقق</h1>
      <p class="subtitle" id="errorSubtitle">لم يتم استيفاء شروط التفعيل</p>

      <div class="divider"></div>

      <!-- Error detail -->
      <div class="error-detail" id="errorDetail">
        يرجى التحقق من الشروط والمحاولة مجدداً.
      </div>

      <a href="/" class="btn btn-back">🔄 حاول مرة أخرى</a>

      <div class="divider"></div>
      <div class="footer">South Group • نظام التحقق الآمن</div>
    </div>
  </div>

  <script>
    const params  = new URLSearchParams(location.search);
    const reason  = params.get('reason');
    const daysOld = params.get('days_old');
    const left    = params.get('days_left');

    const icon     = document.getElementById('statusIcon');
    const title    = document.getElementById('errorTitle');
    const subtitle = document.getElementById('errorSubtitle');
    const detail   = document.getElementById('errorDetail');

    const messages = {
      bot: {
        icon: '🤖',
        title: 'حساب بوت!',
        subtitle: 'البوتات غير مسموح لها بالتحقق',
        detail: 'تم رفض طلبك لأن الحساب المستخدم هو بوت.<br/>يرجى استخدام حساب بشري للتحقق.',
      },
      age: {
        icon: '📅',
        title: 'الحساب جديد جداً',
        subtitle: 'لم يبلغ حسابك 30 يوماً بعد',
        detail: `عمر حسابك الحالي: <strong>${daysOld} يوم</strong><br/>
                 الأيام المتبقية للتفعيل: <strong style="color:var(--yellow)">${left} يوم</strong><br/><br/>
                 يرجى المحاولة مجدداً بعد اكتمال المدة.`,
      },
      no_code: {
        icon: '⚠️',
        title: 'إلغاء التفويض',
        subtitle: 'لم يتم إتمام عملية تسجيل الدخول',
        detail: 'يبدو أنك أغلقت نافذة تسجيل الدخول أو رفضت التفويض.<br/>اضغط على "حاول مرة أخرى" للبدء من جديد.',
      },
      server: {
        icon: '⚙️',
        title: 'خطأ في الخادم',
        subtitle: 'حدث خطأ تقني مؤقت',
        detail: 'حدث خطأ غير متوقع في الخادم.<br/>يرجى المحاولة مرة أخرى بعد لحظات.',
      },
      discord_error: {
        icon: '⚠️',
        title: 'رفض Discord التفويض',
        subtitle: 'حدث خطأ أثناء تسجيل الدخول',
        detail: `سبب الخطأ من Discord:<br/><strong style="color:var(--yellow)">${params.get('desc') || 'unknown'}</strong><br/><br/>اضغط على "حاول مرة أخرى" للمتابعة.`,
      },
    };

    const msg = messages[reason] || messages['server'];
    icon.textContent    = msg.icon;
    title.textContent   = msg.title;
    subtitle.textContent = msg.subtitle;
    detail.innerHTML    = msg.detail;
  </script>
</body>
</html>
